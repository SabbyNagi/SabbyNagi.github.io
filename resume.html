<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume — Sabby Singh</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Inter:wght@300;400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      justify-content: center;
      padding: 16px 24px;
    }

    .nav-inner {
      display: flex;
      gap: 4px;
      background: rgba(5, 20, 55, 0);
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
      border: 1px solid rgba(255,255,255,0);
      border-radius: 50px;
      padding: 6px;
      transition: all 0.4s ease;
    }

    .nav-inner.scrolled {
      background: rgba(5, 20, 55, 0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-color: rgba(255,255,255,0.1);
    }

    .nav a {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      padding: 8px 20px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.01em;
      transition: color 0.2s, background 0.2s;
    }

    .nav a:hover { color: #ffffff; background: rgba(255,255,255,0.08); }
    .nav a.active { color: #ffffff; background: rgba(52,211,153,0.18); }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      background: linear-gradient(to bottom, #fed7aa, #a5f3fc, #22d3ee);
      position: relative;
    }

    .bg {
      position: fixed;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1920&q=80');
      background-size: cover;
      background-position: center 40%;
      opacity: 0.6;
      z-index: 0;
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(52, 211, 153, 0.08) 0%, transparent 50%, rgba(165, 243, 252, 0.06) 100%);
      mix-blend-mode: screen;
    }

    .scrim {
      position: fixed;
      inset: 0;
      background: rgba(5, 20, 55, 0.38);
      z-index: 1;
    }

    .page {
      position: relative;
      z-index: 2;
      max-width: 640px;
      margin: 0 auto;
      padding: 100px 24px 80px;
    }

    h1 {
      font-family: 'Caveat', cursive;
      font-size: 48px;
      font-weight: 600;
      color: #ffffff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.2);
      line-height: 1.1;
      margin-bottom: 24px;
    }

    .resume-container {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    .resume-container iframe {
      width: 100%;
      height: 800px;
      border: none;
      display: block;
    }

    .blur-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 85%;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      background: linear-gradient(
        to bottom,
        rgba(5, 20, 55, 0.0) 0%,
        rgba(5, 20, 55, 0.3) 10%,
        rgba(5, 20, 55, 0.6) 40%,
        rgba(5, 20, 55, 0.85) 100%
      );
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .cta-box {
      pointer-events: auto;
      text-align: center;
      padding: 32px;
      margin-top: 80px;
    }

    .cta-box p {
      font-size: 16px;
      color: rgba(224, 242, 254, 0.9);
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .cta-btn {
      display: inline-block;
      padding: 12px 28px;
      background: #34d399;
      color: #051437;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.02em;
      border-radius: 50px;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }

    .cta-btn:hover {
      background: #6ee7b7;
      transform: translateY(-1px);
      color: #051437;
      text-decoration: none;
    }

    /* ── Footer ── */
    .site-footer {
      position: relative;
      z-index: 2;
      margin-top: 60px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .footer-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px 24px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 32px;
    }

    .footer-heading {
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.04em;
      margin-bottom: 16px;
    }

    .footer-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .footer-col a {
      color: rgba(224, 242, 254, 0.6);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }

    .footer-col a:hover {
      color: #34d399;
    }

    .social-icons {
      display: flex;
      gap: 16px;
    }

    .social-icons a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(224, 242, 254, 0.6);
      transition: all 0.2s;
    }

    .social-icons a:hover {
      background: rgba(52,211,153,0.15);
      border-color: rgba(52,211,153,0.3);
      color: #34d399;
    }

    .social-icons svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .footer-bar {
      text-align: center;
      padding: 20px 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.28);
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    @media (max-width: 480px) {
      .footer-inner {
        grid-template-columns: 1fr;
        gap: 28px;
        padding: 36px 24px 20px;
      }
    }
  </style>
</head>
<body>

    <div class="nav-inner">

        <div class="cta-box">

  </div>

      </div>
      <div class="footer-col">
        <div class="footer-heading">Connect</div>
        <div class="social-icons">
          <a href="https://www.linkedin.com/in/sarabjitnagi/" target="_blank" aria-label="LinkedIn">

    </div>
    <div class="footer-bar">

  <script>
    const ni = document.querySelector('.nav-inner');
    const onScroll = () => ni.classList.toggle('scrolled', window.scrollY > 40);
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  </script>
  <script>
    fetch('https://sabbynagi.goatcounter.com/counter/' + encodeURIComponent(location.pathname) + '.json')
      .then(r => r.json()).then(d => { document.getElementById('gc-count').textContent = d.count; }).catch(() => {});
  </script>
  <script data-goatcounter="https://sabbynagi.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
